<svg viewBox="0 0 820 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" style="background:#0d1117">
  <title>smart-rag Architecture Flow</title>
  <desc>Flowchart showing how smart-rag indexes a codebase and serves MCP tools to AI clients</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#888"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#4f8ef7"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#34a853"/>
    </marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#e3b341"/>
    </marker>
  </defs>

  <!-- Band: INPUT -->
  <rect x="16" y="50" width="788" height="110" fill="#161b22" rx="8" opacity="0.9"/>
  <text x="32" y="74" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">INPUT</text>

  <!-- Band: INDEX PIPELINE -->
  <rect x="16" y="178" width="788" height="180" fill="#161b22" rx="8" opacity="0.9"/>
  <text x="32" y="202" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">INDEX PIPELINE</text>

  <!-- Band: STORAGE -->
  <rect x="16" y="376" width="788" height="100" fill="#161b22" rx="8" opacity="0.9"/>
  <text x="32" y="400" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">STORAGE (BoltDB)</text>

  <!-- Band: MCP SERVER -->
  <rect x="16" y="494" width="788" height="110" fill="#161b22" rx="8" opacity="0.9"/>
  <text x="32" y="518" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">MCP SERVER (stdio)</text>

  <!-- INPUT ROW -->

  <!-- Source Repo -->
  <rect x="50" y="82" width="140" height="58" rx="6" fill="#1c2a3a" stroke="#4f8ef7" stroke-width="1.5"/>
  <text x="120" y="107" text-anchor="middle" fill="#4f8ef7" font-weight="700" font-size="12">Source Repo</text>
  <text x="120" y="124" text-anchor="middle" fill="#8b949e" font-size="10">.go files</text>

  <!-- Syncer -->
  <rect x="240" y="82" width="140" height="58" rx="6" fill="#1c2d1c" stroke="#34a853" stroke-width="1.5"/>
  <text x="310" y="107" text-anchor="middle" fill="#34a853" font-weight="700" font-size="12">Syncer</text>
  <text x="310" y="124" text-anchor="middle" fill="#8b949e" font-size="10">git diff / hash compare</text>

  <!-- arrow repo → syncer -->
  <line x1="190" y1="111" x2="238" y2="111" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Full Re-index -->
  <rect x="430" y="82" width="160" height="58" rx="6" fill="#2a1c1c" stroke="#e05252" stroke-width="1.5"/>
  <text x="510" y="107" text-anchor="middle" fill="#e05252" font-weight="700" font-size="12">Full Re-index</text>
  <text x="510" y="124" text-anchor="middle" fill="#8b949e" font-size="10">--full flag</text>

  <!-- OR label -->
  <text x="408" y="115" text-anchor="middle" fill="#8b949e" font-size="11" font-style="italic">or</text>

  <!-- INDEX PIPELINE ROW -->

  <!-- Parser -->
  <rect x="50" y="215" width="120" height="52" rx="6" fill="#1e1e2e" stroke="#a371f7" stroke-width="1.5"/>
  <text x="110" y="238" text-anchor="middle" fill="#a371f7" font-weight="700" font-size="12">Parser</text>
  <text x="110" y="254" text-anchor="middle" fill="#8b949e" font-size="10">AST / go/parser</text>

  <!-- Chunker -->
  <rect x="210" y="215" width="120" height="52" rx="6" fill="#1e1e2e" stroke="#a371f7" stroke-width="1.5"/>
  <text x="270" y="238" text-anchor="middle" fill="#a371f7" font-weight="700" font-size="12">Chunker</text>
  <text x="270" y="254" text-anchor="middle" fill="#8b949e" font-size="10">512-token blocks</text>

  <!-- BM25 -->
  <rect x="370" y="215" width="120" height="52" rx="6" fill="#1e1e2e" stroke="#a371f7" stroke-width="1.5"/>
  <text x="430" y="238" text-anchor="middle" fill="#a371f7" font-weight="700" font-size="12">BM25</text>
  <text x="430" y="254" text-anchor="middle" fill="#8b949e" font-size="10">inverted index</text>

  <!-- CallGraph -->
  <rect x="530" y="215" width="120" height="52" rx="6" fill="#1e1e2e" stroke="#a371f7" stroke-width="1.5"/>
  <text x="590" y="238" text-anchor="middle" fill="#a371f7" font-weight="700" font-size="12">CallGraph</text>
  <text x="590" y="254" text-anchor="middle" fill="#8b949e" font-size="10">callers / callees</text>

  <!-- ImportGraph -->
  <rect x="530" y="285" width="120" height="52" rx="6" fill="#1e1e2e" stroke="#a371f7" stroke-width="1.5"/>
  <text x="590" y="308" text-anchor="middle" fill="#a371f7" font-weight="700" font-size="12">ImportGraph</text>
  <text x="590" y="324" text-anchor="middle" fill="#8b949e" font-size="10">pkg deps</text>

  <!-- pipeline arrows -->
  <line x1="170" y1="241" x2="208" y2="241" stroke="#a371f7" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="330" y1="241" x2="368" y2="241" stroke="#a371f7" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="490" y1="241" x2="528" y2="241" stroke="#a371f7" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- CallGraph → ImportGraph -->
  <line x1="590" y1="267" x2="590" y2="283" stroke="#a371f7" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- syncer → parser (solid) -->
  <line x1="310" y1="140" x2="310" y2="200" stroke="#888" stroke-width="1.5"/>
  <line x1="310" y1="200" x2="112" y2="200" stroke="#888" stroke-width="1.5"/>
  <line x1="112" y1="200" x2="112" y2="213" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- full re-index → parser (dashed) -->
  <line x1="510" y1="140" x2="510" y2="200" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="510" y1="200" x2="112" y2="200" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- STORAGE ROW -->

  <!-- ChunkStore -->
  <rect x="50" y="408" width="140" height="52" rx="6" fill="#1a1a0e" stroke="#e3b341" stroke-width="1.5"/>
  <text x="120" y="430" text-anchor="middle" fill="#e3b341" font-weight="700" font-size="12">ChunkStore</text>
  <text x="120" y="447" text-anchor="middle" fill="#8b949e" font-size="10">chunk:&lt;id&gt;</text>

  <!-- IndexStore -->
  <rect x="230" y="408" width="140" height="52" rx="6" fill="#1a1a0e" stroke="#e3b341" stroke-width="1.5"/>
  <text x="300" y="430" text-anchor="middle" fill="#e3b341" font-weight="700" font-size="12">IndexStore</text>
  <text x="300" y="447" text-anchor="middle" fill="#8b949e" font-size="10">file hashes</text>

  <!-- GraphStore -->
  <rect x="410" y="408" width="140" height="52" rx="6" fill="#1a1a0e" stroke="#e3b341" stroke-width="1.5"/>
  <text x="480" y="430" text-anchor="middle" fill="#e3b341" font-weight="700" font-size="12">GraphStore</text>
  <text x="480" y="447" text-anchor="middle" fill="#8b949e" font-size="10">nodes / edges</text>

  <!-- BoltDB -->
  <rect x="590" y="408" width="190" height="52" rx="6" fill="#141a14" stroke="#34a853" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="685" y="431" text-anchor="middle" fill="#34a853" font-weight="700" font-size="12">BoltDB on disk</text>
  <text x="685" y="448" text-anchor="middle" fill="#8b949e" font-size="10">single bucket "rag"</text>

  <!-- chunker → ChunkStore -->
  <line x1="270" y1="267" x2="270" y2="370" stroke="#e3b341" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="270" y1="370" x2="120" y2="370" stroke="#e3b341" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="120" y1="370" x2="120" y2="406" stroke="#e3b341" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-gold)"/>

  <!-- BM25 → GraphStore -->
  <line x1="430" y1="267" x2="430" y2="370" stroke="#e3b341" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="430" y1="370" x2="480" y2="370" stroke="#e3b341" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-gold)"/>

  <!-- ImportGraph → GraphStore -->
  <line x1="590" y1="337" x2="650" y2="337" stroke="#e3b341" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="650" y1="337" x2="650" y2="370" stroke="#e3b341" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="650" y1="370" x2="482" y2="370" stroke="#e3b341" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- stores → BoltDB -->
  <line x1="190" y1="434" x2="228" y2="434" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arr-gold)"/>
  <line x1="370" y1="434" x2="408" y2="434" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arr-gold)"/>
  <line x1="550" y1="434" x2="588" y2="434" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arr-gold)"/>

  <!-- MCP SERVER ROW -->

  <!-- Engine -->
  <rect x="50" y="530" width="120" height="52" rx="6" fill="#1c1c2e" stroke="#58a6ff" stroke-width="2"/>
  <text x="110" y="553" text-anchor="middle" fill="#58a6ff" font-weight="700" font-size="12">Engine</text>
  <text x="110" y="570" text-anchor="middle" fill="#8b949e" font-size="10">query routing</text>

  <!-- MCP Handler -->
  <rect x="220" y="530" width="140" height="52" rx="6" fill="#1c1c2e" stroke="#58a6ff" stroke-width="2"/>
  <text x="290" y="553" text-anchor="middle" fill="#58a6ff" font-weight="700" font-size="12">MCP Handler</text>
  <text x="290" y="570" text-anchor="middle" fill="#8b949e" font-size="10">8 tools · stdio</text>

  <!-- AI Client -->
  <rect x="550" y="530" width="220" height="52" rx="6" fill="#1c2a1c" stroke="#34a853" stroke-width="2"/>
  <text x="660" y="553" text-anchor="middle" fill="#34a853" font-weight="700" font-size="13">Claude / AI Client</text>
  <text x="660" y="570" text-anchor="middle" fill="#8b949e" font-size="10">Claude Desktop · Claude Code</text>

  <!-- engine → mcp -->
  <line x1="170" y1="556" x2="218" y2="556" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- mcp ↔ client -->
  <line x1="362" y1="550" x2="548" y2="550" stroke="#34a853" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="548" y1="560" x2="362" y2="560" stroke="#34a853" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="455" y="543" text-anchor="middle" fill="#34a853" font-size="10">JSON-RPC</text>

  <!-- storage → engine -->
  <line x1="110" y1="460" x2="110" y2="528" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- LEGEND -->
  <rect x="50" y="596" width="10" height="10" rx="2" fill="#4f8ef7"/>
  <text x="66" y="606" fill="#8b949e" font-size="10">Input / trigger</text>
  <rect x="170" y="596" width="10" height="10" rx="2" fill="#a371f7"/>
  <text x="186" y="606" fill="#8b949e" font-size="10">Index pipeline</text>
  <rect x="290" y="596" width="10" height="10" rx="2" fill="#e3b341"/>
  <text x="306" y="606" fill="#8b949e" font-size="10">Storage</text>
  <rect x="370" y="596" width="10" height="10" rx="2" fill="#58a6ff"/>
  <text x="386" y="606" fill="#8b949e" font-size="10">MCP serve</text>
  <rect x="460" y="596" width="10" height="10" rx="2" fill="#34a853"/>
  <text x="476" y="606" fill="#8b949e" font-size="10">Client</text>
</svg>
