services:
  smart-rag:
    image: robbymangku/smart-rag:latest
    build:
      context: .
      args:
        VERSION: "0.4.6"
    stdin_open: true   # keep stdin open for MCP stdio transport
    tty: false
    volumes:
      - ${REPO_DIR:-.}:/repo:ro
      - rag-data:/data
    command: ["--repo=/repo", "--db=/data"]

  # One-shot service: run a full re-index then exit.
  # Usage: docker compose run --rm index
  index:
    image: robbymangku/smart-rag:latest
    build:
      context: .
      args:
        VERSION: "0.4.6"
    volumes:
      - ${REPO_DIR:-.}:/repo:ro
      - rag-data:/data
    command: ["--repo=/repo", "--db=/data", "--full"]
    profiles: ["tools"]

volumes:
  rag-data:
